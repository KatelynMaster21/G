- name: Running patch-recovery-revived
  run: |
    echo "Downloading recovery file..."
    curl -L "${{ github.event.inputs.recovery_link }}" -o recovery_file
    file recovery_file  # Check file type
    ls -lh recovery_file  # Check file size
    GOFILE=1 bash patch-recovery.sh "${{ github.event.inputs.recovery_link }}" "${{ github.event.inputs.model }}"
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Your Model Number'
        required: true

      recovery_link:
        description: 'Enter the Direct Download Link (.img / .lz4 / .zip / .tar):'
        required: true   
              
jobs:
  patch-recovery-revived:
    runs-on: ubuntu-latest
    permissions:
      contents: write    
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          
      - name: Running patch-recovery-revived
        run: |
          GOFILE=1 bash patch-recovery.sh "${{ github.event.inputs.recovery_link }}" "${{ github.event.inputs.model }}"
      
      - name: Uploading Artifact
        uses: actions/upload-artifact@v6
        with:
          name: "Fastbootd-patched-recovery-${{ github.event.inputs.model }}"
          path: output/
